name: Bug Report
description: File a bug report for UPatch. English ONLY.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## **STOP AND READ**
        - This repository is **ENGLISH ONLY**. Issues in other languages will be closed.
        - Ensure you have read `CONTRIBUTING.md`.
        - Do **NOT** report KernelPatch issues (e.g., kernel panics, patching failures) here. Report them to the KernelPatch upstream.
        - Provide **TEXT LOGS**. Do NOT upload screenshots of text logs.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Check all that apply. If you skip these, your issue will be closed.
      options:
        - label: "I have searched the existing issues."
          required: true
        - label: "I have read CONTRIBUTING.md."
          required: true
        - label: "This is NOT a kernel panic or a direct KernelPatch core failure."
          required: true
        - label: "My title is in English."
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Provide precise, step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: device_info
    attributes:
      label: Device Information
      description: Provide device model, Android version, Kernel version, etc.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Bug Report
      description: Paste text logs in the code block below, or attach the manager-generated bug report archive. NO SCREENSHOTS OF TEXT.
      value: |
        ```log
        Paste logs here
        ```
    validations:
      required: true