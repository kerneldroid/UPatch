name: Bug report
description: Report a bug of UPatch

body:
  - type: markdown
    attributes:
      value: |
        Please write in English. Do **NOT** report KernelPatch issues (e.g., kernel panics, patching failures) here. Report them to the KernelPatch upstream.
  - type: checkboxes
    id: requirements
    attributes:
      label: Requirements
      options:
        - label: I have searched the existing issues
        - label: UPatch is downloaded from official channels (GitHub release)
        - label: This is NOT a kernel panic or a direct KernelPatch core failure
  - type: input
    id: upatch_version
    attributes:
      label: UPatch version
    validations:
      required: true
  - type: input
    id: device_and_android
    attributes:
      label: Device and Android version
      description: "Example: Google Pixel 7 Pro, Android 14"
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: What did you do
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: What happened
      description: Provide TEXT LOGS. You can attach the manager-generated bug report archive. NO SCREENSHOTS OF TEXT.
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: What do you expect
    validations:
      required: true
